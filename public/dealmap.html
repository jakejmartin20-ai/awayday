<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#EFE7D6" />
<title>Away Day — the deal-map (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#EFE7D6; --charcoal:#1C1C1C; --scarlet:#C8102E;
    --gold:#D9A441; --navy:#1B3A5C; --border:#CFC3A8; --muted:#8A7C60;
    --skew: skewX(-10deg);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  button{color:inherit; font:inherit; border:0; background:none; cursor:pointer;}
  body{
    background:var(--cream); color:var(--charcoal);
    font-family:'Oswald','Arial Narrow',sans-serif; font-weight:500;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:430px; margin:0 auto; min-height:100vh; background:var(--cream); padding-bottom:40px;}
  .pad{padding:0 16px 24px;}

  /* --- HEADER ----------------------------------------------------------- */
  .hdr{display:flex; align-items:center; gap:8px; padding:16px 16px 10px;}
  .back{font-size:22px; font-weight:700; line-height:1; padding:2px 6px 4px 0;}
  .mark{display:flex; align-items:center; gap:0;}
  .mark-txt{font-weight:700; font-size:26px; letter-spacing:0.06em; text-transform:uppercase; transform:var(--skew);}
  .mark-bar{flex:1; height:9px; background:var(--scarlet); transform:var(--skew); margin-left:8px; min-width:40px;}

  /* --- STRIP ------------------------------------------------------------ */
  .strip{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--charcoal); padding:9px 16px;
  }
  .strip span{text-transform:uppercase; font-weight:700; font-size:14px; letter-spacing:0.12em;}
  .strip .l{color:var(--cream);}
  .strip .r{color:var(--gold);}

  /* --- KICKER ----------------------------------------------------------- */
  .kicker{
    text-transform:uppercase; color:var(--muted); font-weight:500;
    font-size:13px; letter-spacing:0.28em; padding:18px 0 12px;
  }

  /* --- THE STAGE -------------------------------------------------------- */
  /* Map and wheel share ONE coordinate space so a pin can fly from a real
     place on the earth onto the wheel's rim and land exactly on it.        */
  .stage{position:relative; width:100%; aspect-ratio:330/345; overflow:hidden;}

  .map{
    position:absolute; inset:0; overflow:hidden;
    background:#dfe3d8; border:2px solid var(--charcoal);
    opacity:0; transition:opacity .45s ease;
  }
  .map.on{opacity:1;}
  .tiles{position:absolute; top:0; left:0; will-change:transform;}
  .tiles img{position:absolute; width:256px; height:256px; display:block;}
  .attrib{
    position:absolute; right:0; bottom:0; z-index:3;
    background:rgba(239,231,214,.82); color:#333;
    font-family:system-ui,sans-serif; font-size:9px; padding:1px 4px;
  }
  .attrib a{color:#333;}

  /* --- THE PINS --------------------------------------------------------- */
  .pin{
    position:absolute; width:16px; height:16px; margin:-16px 0 0 -8px;
    z-index:4; opacity:0; pointer-events:none;
    will-change:transform,opacity;
  }
  .pin i{
    display:block; width:16px; height:16px; border-radius:50% 50% 50% 0;
    background:var(--scarlet); border:1.5px solid var(--charcoal);
    transform:rotate(-45deg);
  }

  /* --- THE WHEEL -------------------------------------------------------- */
  .wheel{
    position:absolute; inset:0; width:100%; height:100%;
    z-index:5; opacity:0; transition:opacity .35s ease;
  }
  .wheel.on{opacity:1;}
  .slice-label{
    font-family:'Oswald','Arial Narrow',sans-serif; font-weight:700;
    font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
  }

  /* --- TICKER + LANDING ------------------------------------------------- */
  .ticker{
    text-align:center; text-transform:uppercase; font-weight:700;
    font-size:15px; letter-spacing:0.16em; color:var(--muted);
    height:22px; padding-top:10px;
  }
  .landing{padding-top:6px;}
  .landing-city{
    text-transform:uppercase; font-weight:700; font-size:42px; line-height:1;
    color:var(--scarlet); transform:var(--skew); letter-spacing:0.02em;
    padding:4px 0 8px;
  }
  .lower-third{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--charcoal); color:var(--cream); padding:8px 12px;
    text-transform:uppercase; font-weight:700; font-size:13px;
    letter-spacing:0.1em; margin-bottom:14px;
  }
  .lower-third .r{color:var(--gold);}

  /* --- BUTTONS ---------------------------------------------------------- */
  .btn{
    display:block; width:100%; text-align:center; text-transform:uppercase;
    font-weight:700; font-size:18px; letter-spacing:0.14em;
    padding:16px 0; margin-top:10px; transform:var(--skew);
  }
  .btn span{display:inline-block; transform:skewX(10deg);}
  .btn--loud{background:var(--scarlet); color:var(--cream);}
  .btn--quiet{background:transparent; color:var(--charcoal);}
  .btn:disabled{opacity:.45;}

  /* --- THE MOCKUP HARNESS (not part of the app) ------------------------- */
  .harness{
    margin-top:28px; border-top:2px solid var(--border); padding-top:12px;
  }
  .harness .h{
    text-transform:uppercase; color:var(--muted); font-size:11px;
    letter-spacing:0.24em; padding-bottom:8px;
  }
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    border:2px solid var(--charcoal); background:transparent;
    text-transform:uppercase; font-weight:700; font-size:11px;
    letter-spacing:0.08em; padding:7px 9px;
  }
  .chip.on{background:var(--charcoal); color:var(--cream);}
  .note{
    color:var(--muted); font-size:12px; line-height:1.5; padding-top:10px;
    letter-spacing:0.02em;
  }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="back">&#8592;</div>
    <div class="mark" style="flex:1">
      <div class="mark-txt">Away Day</div>
      <div class="mark-bar"></div>
    </div>
  </div>

  <div class="strip">
    <span class="l" id="strip-l">Sat 18 &ndash; Sun 19 July</span>
    <span class="r" id="strip-r">58 towns in play</span>
  </div>

  <div class="pad">
    <div class="kicker" id="kicker">Fate is dealing</div>

    <div class="stage" id="stage">
      <div class="map" id="map">
        <div class="tiles" id="tiles"></div>
        <div class="attrib">&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a></div>
      </div>
      <svg class="wheel" id="wheel" viewBox="0 0 330 345" role="img" aria-label="The wheel"></svg>
    </div>

    <div class="ticker" id="ticker">&nbsp;</div>

    <div class="landing" id="landing"></div>

    <!-- ------------------------------------------------------------------ -->
    <!-- HARNESS. Mockup only. Never ships.                                  -->
    <!-- ------------------------------------------------------------------ -->
    <div class="harness">
      <div class="h">Mockup harness &mdash; not part of the app</div>
      <div class="chips">
        <button class="chip on" data-pool="us">An ordinary weekend</button>
        <button class="chip" data-pool="tight">A tight regional deal</button>
        <button class="chip" data-pool="wide">A coast-to-coast deal</button>
        <button class="chip" data-pool="jax">Mode 1 &mdash; the Jaguars</button>
      </div>
      <div class="h" style="padding-top:14px">Does it auto-spin?</div>
      <div class="chips">
        <button class="chip" id="auto-off">Tap to spin</button>
        <button class="chip on" id="auto-on">Auto-spin &mdash; one unbroken run</button>
      </div>
      <div class="h" style="padding-top:14px">How long is the spin? (one number, both modes)</div>
      <div class="chips" id="speeds">
        <button class="chip" data-ms="5500">5.5s &mdash; as shipped</button>
        <button class="chip on" data-ms="4500">4.5s</button>
        <button class="chip" data-ms="4000">4.0s</button>
        <button class="chip" data-ms="3500">3.5s</button>
      </div>
      <div class="note" id="clock"></div>
      <div class="note" id="note"></div>
    </div>
  </div>
</div>

// On auto-spin the run is ~8.9s hands-off and 5.5s of it is the wheel.
// ⚠️ THIS IS ONE NUMBER FOR BOTH MODES. Changing it changes Mode 1.
// The app has ONE MOVING PART (S6) — it does not get two timings.
// -------------------------------------------------------------------------
let SPIN_MS = 4500;
const TURNS = 6;
const VB_W = 330, VB_H = 345;
const FILL = { scarlet:'#C8102E', charcoal:'#1C1C1C', gold:'#D9A441', navy:'#1B3A5C' };
const PALETTE = ['scarlet','charcoal','gold','navy'];

// -------------------------------------------------------------------------
// WEB MERCATOR. Six lines, no library, no key, nothing added to the bundle.
// -------------------------------------------------------------------------
const TILE = 256;
function project(lat, lng, z) {
  const ws = TILE * Math.pow(2, z);
  const x = (lng + 180) / 360 * ws;
  const s = Math.sin(lat * Math.PI / 180);
  const y = (0.5 - Math.log((1 + s) / (1 - s)) / (4 * Math.PI)) * ws;
  return { x, y };
}

// -------------------------------------------------------------------------
// 🔴 THE ANTIMERIDIAN. Seattle is at -122. Melbourne is at +145. Take the
// min and the max and you get a 267-degree box — a map of AFRICA with two
// pins clinging to opposite edges. The real hop is 127 degrees, across the
// Pacific.
//
// The correct window is the COMPLEMENT OF THE LARGEST EMPTY GAP on the
// circle of longitude. It is a no-op for every all-American deal, so it
// costs nothing and it is always right.
// -------------------------------------------------------------------------
function lngWindow(lngs) {
  const s = [...new Set(lngs)].sort((a, b) => a - b);
  if (s.length === 1) return { west: s[0], east: s[0] };
  let best = -1, wi = 0;
  for (let i = 0; i < s.length; i++) {
    const a = s[i], b = s[(i + 1) % s.length];
    const gap = ((b - a) % 360 + 360) % 360;
    if (gap > best) { best = gap; wi = (i + 1) % s.length; }
  }
  const west = s[wi];
  let east = s[(wi - 1 + s.length) % s.length];
  while (east < west) east += 360;
  return { west, east };
}

// Fit the nine dealt towns into the stage. The map is DIFFERENT EVERY DEAL —
// that is the point. Nine towns in Ohio and it's a map of Ohio. Helsinki in
// the nine and the map goes transatlantic, before a single name is shown.
function frame(towns, W, H) {
  const { west, east } = lngWindow(towns.map(t => t.lng));
  const lats = towns.map(t => t.lat);
  const north = Math.max(...lats), south = Math.min(...lats);

  const PAD = 46;                       // px of breathing room round the pins
  const usableW = Math.max(40, W - PAD * 2);
  const usableH = Math.max(40, H - PAD * 2);

  for (let z = 12; z >= 0; z--) {
    const a = project(north, west, z);
    const b = project(south, east, z);
    if ((b.x - a.x) <= usableW && (b.y - a.y) <= usableH) {
      const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
      return { z, originX: cx - W / 2, originY: cy - H / 2 };
    }
  }
  const a = project(north, west, 0), b = project(south, east, 0);
  return { z: 0, originX: (a.x + b.x) / 2 - W / 2, originY: (a.y + b.y) / 2 - H / 2 };
}

// -------------------------------------------------------------------------
// DRAW THE MAP OUT OF RAW OSM TILES.
//
// Why tiles and not the /export/embed.html iframe the result screen uses:
// the iframe fits your bbox with Leaflet, which SNAPS TO AN INTEGER ZOOM and
// then shows you MORE ground than you asked for. You cannot know how much.
// Pins positioned by maths over a frame that quietly re-framed itself land
// in the wrong place — and it would look almost right, which is worse.
//
// Tiles I place myself. The projection is then MINE, and the pin maths and
// the map maths are the same maths. Same rule as the bake: no fallback, no
// "close enough".
// -------------------------------------------------------------------------
function drawMap(view, W, H) {
  const tiles = document.getElementById('tiles');
  tiles.innerHTML = '';
  const { z, originX, originY } = view;
  const max = Math.pow(2, z);
  const x0 = Math.floor(originX / TILE), x1 = Math.floor((originX + W) / TILE);
  const y0 = Math.floor(originY / TILE), y1 = Math.floor((originY + H) / TILE);
  for (let ty = y0; ty <= y1; ty++) {
    if (ty < 0 || ty >= max) continue;
    for (let tx = x0; tx <= x1; tx++) {
      const wrapped = ((tx % max) + max) % max;     // the world repeats sideways
      const img = document.createElement('img');
      img.src = `https://tile.openstreetmap.org/${z}/${wrapped}/${ty}.png`;
      img.loading = 'eager';
      img.alt = '';
      img.style.left = (tx * TILE - originX) + 'px';
      img.style.top  = (ty * TILE - originY) + 'px';
      tiles.appendChild(img);
    }
  }
}

function pinXY(town, view, W) {
  const p = project(town.lat, town.lng, view.z);
  const ws = TILE * Math.pow(2, view.z);
  let x = p.x - view.originX;
  // unwrap: keep the pin on the copy of the world we are actually looking at
  while (x < -ws / 2) x += ws;
  while (x >  ws * 1.5) x -= ws;
  if (x < 0 && x + ws < W) x += ws;
  return { x, y: p.y - view.originY };
}

// -------------------------------------------------------------------------
// THE WHEEL. Geometry, colours and easing lifted from the real Wheel.jsx.
// -------------------------------------------------------------------------
function sliceColours(n) {
  const out = [];
  for (let i = 0; i < n; i++) {
    let c = PALETTE[i % PALETTE.length];
    const prev = out[i - 1], last = i === n - 1;
    if (c === prev || (last && c === out[0])) {
      c = PALETTE.find(x => x !== prev && !(last && x === out[0])) || c;
    }
    out.push(c);
  }
  return out;
}
function wedgePath(from, to) {
  const a = d => { const r = (d - 90) * Math.PI / 180; return [CX + R*Math.cos(r), CY + R*Math.sin(r)]; };
  const [x1,y1] = a(from), [x2,y2] = a(to);
  return `M ${CX} ${CY} L ${x1} ${y1} A ${R} ${R} 0 ${to-from>180?1:0} 1 ${x2} ${y2} Z`;
}
const easeOut = t => 1 - Math.pow(1 - t, 4);

// -------------------------------------------------------------------------
// STATE
// -------------------------------------------------------------------------
const stage  = document.getElementById('stage');
const mapEl  = document.getElementById('map');
const wheelEl= document.getElementById('wheel');
const kicker = document.getElementById('kicker');
const tickerEl = document.getElementById('ticker');
const landing  = document.getElementById('landing');
const stripL = document.getElementById('strip-l');
const stripR = document.getElementById('strip-r');
const noteEl = document.getElementById('note');

let dealt = [], pins = [], colours = [], rot = 0, spinning = false, poolKey = 'us';

const KEYS = Object.keys(CARDS);

// -------------------------------------------------------------------------
// MODE 2'S POOL IS US + CANADA (S18, Jake's call).
//
// Nine cards are international: London, Madrid, Paris, Munich, Dusseldorf,
// Helsinki, Rio, Melbourne, Mexico City. They stay in the app — they are on
// FIFTEEN NFL clubs' slates and four NHL clubs' — but MODE 1 KEEPS THEM AND
// MODE 2 DOES NOT. If you CHOSE the Jaguars, London is the prize. If all you
// said was "I'm free that weekend", fate does not get to book you Melbourne.
//
// In the app this is `intl: true` on the card. Mode 1 ignores the key, so
// NOTHING SHIPPED CHANGES. Mode 2 filters on it. Reversible by deleting it.
//
// COMPUTED FROM THE COORDINATES, not from a list I typed. I typed one first
// and it was wrong — I forgot London and Madrid. A list goes stale the moment
// the NBA adds a game in Abu Dhabi. A box round the continent does not.
// (S6: never draw from memory what can be generated from data.)
// -------------------------------------------------------------------------
const isDomestic = k => {
  const c = CARDS[k];
  return c.lng >= -170 && c.lng <= -50 && c.lat >= 24 && c.lat <= 72;  // US + Canada
};
const US = KEYS.filter(isDomestic);

// Fixed decks, so the same deal can be looked at twice.
const TIGHT = ['toledo','detroit','cleveland','columbus','fortwayne','grandrapids','lansing','akron','dayton'];
const WIDE  = ['seattle','sandiego','denver','austin','minneapolis','tampa','boston','vancouver','montreal'];
// Mode 1: the ONLY NFL club that fires the deal. Its slate has LONDON on it twice.
const JAX   = ['london','philadelphia','houston','cleveland','buffalo','denver','nashville','indianapolis','newyork'];

const DECKS = { tight: TIGHT, wide: WIDE, jax: JAX };
function pickNine() {
  const deck = DECKS[poolKey];
  if (deck) return deck.slice(0, N).map(k => ({ key:k, ...CARDS[k] }));
  const rest = US.slice();
  for (let i = rest.length - 1; i > 0; i--) { const j = (Math.random()*(i+1))|0; [rest[i],rest[j]]=[rest[j],rest[i]]; }
  return rest.slice(0, N).map(k => ({ key:k, ...CARDS[k] }));
}

// -------------------------------------------------------------------------
// THE BEAT SHEET
//   1. the map frames itself round the nine
//   2. nine ANONYMOUS pins drop, one at a time
//   3. a beat
//   4. the pins lift, the map dies under them, the pins fly to the rim
//   5. the rim IS the wheel. The names appear only now. (S4 — withhold it.)
// -------------------------------------------------------------------------
function deal() {
  spinning = false; rot = 0;
  wheelEl.classList.remove('on');
  wheelEl.innerHTML = '';
  landing.innerHTML = '';
  tickerEl.innerHTML = '&nbsp;';
  kicker.textContent = 'Fate is dealing';
  document.querySelectorAll('.pin').forEach(p => p.remove());

  dealt = pickNine();
  colours = sliceColours(N);

  const W = stage.clientWidth, H = stage.clientHeight;
  const view = frame(dealt, W, H);
  drawMap(view, W, H);
  mapEl.classList.add('on');

  noteEl.innerHTML =
    `<b>zoom ${view.z}</b> &middot; the map framed itself round the nine. ` +
    `Towns: ${dealt.map(t=>t.city).join(', ')}.`;
  updateClock();

  pins = dealt.map((t, i) => {
    const el = document.createElement('div');
    el.className = 'pin';
    el.innerHTML = '<i></i>';
    const { x, y } = pinXY(t, view, W);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.transform = 'translateY(-34px) scale(.7)';
    stage.appendChild(el);
    // one at a time. 120ms apart. Fate is counting them out.
    setTimeout(() => {
      el.style.transition = 'transform .34s cubic-bezier(.34,1.56,.64,1), opacity .18s ease';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0) scale(1)';
    }, 380 + i * 120);
    return { el, x, y };
  });

  // 4 + 5: the beat, then the lift.
  setTimeout(toRim, 380 + N * 120 + 700);
}

function toRim() {
  const W = stage.clientWidth, H = stage.clientHeight;
  const sx = W / VB_W, sy = H / VB_H;
  kicker.textContent = 'Spin it';

  pins.forEach((p, i) => {
    const mid = i * (360 / N) + (360 / N) / 2;      // centre of its slice
    const a = (mid - 90) * Math.PI / 180;
    const tx = (CX + R * Math.cos(a)) * sx;
    const ty = (CY + R * Math.sin(a)) * sy;
    p.el.style.transition = 'transform .85s cubic-bezier(.6,.02,.2,1), opacity .3s ease .55s';
    p.el.style.transform = `translate(${tx - p.x}px, ${ty - p.y}px) scale(.85)`;
    p.el.style.opacity = '0';                      // it becomes the rim
  });

  mapEl.style.transition = 'opacity .6s ease .25s';
  mapEl.classList.remove('on');

  setTimeout(() => { drawWheel(); wheelEl.classList.add('on'); showSpin(); }, 700);
}

function drawWheel() {
  const g = dealt.map((t, i) => {
    const from = i * (360/N), to = from + 360/N, mid = from + 180/N;
    const angle = mid - 90;
    const norm = ((angle % 360) + 360) % 360;
    const flip = norm > 90 && norm < 270;
    const rr = R - 12, rad = angle * Math.PI / 180;
    const lx = CX + rr * Math.cos(rad), ly = CY + rr * Math.sin(rad);
    const c = colours[i];
    return `<g>
      <path d="${wedgePath(from,to)}" fill="${FILL[c]}" stroke="#EFE7D6" stroke-width="1"/>
      <text class="slice-label" x="${lx}" y="${ly}" fill="${c==='gold'?'#1C1C1C':'#EFE7D6'}"
        text-anchor="${flip?'start':'end'}" dominant-baseline="middle"
        transform="rotate(${flip?angle+180:angle} ${lx} ${ly})">${t.city.toUpperCase()}</text>
    </g>`;
  }).join('');

  wheelEl.innerHTML = `
    <g id="rotor" transform="rotate(${rot} ${CX} ${CY})">${g}</g>
    <g id="crown"></g>
    <circle cx="${CX}" cy="${CY}" r="${HUB}" fill="#EFE7D6" stroke="#1C1C1C" stroke-width="3"/>
    <g id="needle"><path d="M ${CX-11} 6 L ${CX+11} 6 L ${CX} 34 Z" fill="#1C1C1C"/></g>`;
}

// -------------------------------------------------------------------------
// AUTO-SPIN (S18, Jake's call to test).
//
// If fate deals and fate picks, the "Spin" button is a FAKE DECISION — you
// were always going to press it, and there is nothing to think about while
// you decide. The map already gave you the beat.
//
// THE COST: it makes the whole run hands-off. ~8.9 seconds of animation with
// nothing to touch. The commitment does not disappear — IT MOVES TO THE FRONT.
// One loud button on the date screen, and fate runs unbroken to the result.
// -------------------------------------------------------------------------
let AUTO = true;

function showSpin() {
  if (AUTO) {
    landing.innerHTML = '';
    setTimeout(() => { if (!spinning && !document.getElementById('see')) spin(); }, 260);
    return;
  }
  landing.innerHTML = `<button class="btn btn--loud" id="spin"><span>Spin</span></button>
    <button class="btn btn--quiet" id="again"><span>Deal again</span></button>`;
  document.getElementById('spin').onclick = spin;
  document.getElementById('again').onclick = deal;
}

function spin() {
  if (spinning) return;
  spinning = true;
  kicker.textContent = 'Fate is deciding';
  const b = document.getElementById('spin');
  if (b) b.disabled = true;

  const step = 360 / N;
  const pick = (Math.random() * N) | 0;
  const from = rot;
  const landingRot = (360 - ((from + pick*step + step/2) % 360) + 360) % 360;
  const target = from + 360 * TURNS + landingRot;

  const rotor = document.getElementById('rotor');
  const needle = document.getElementById('needle');
  const t0 = performance.now();
  let prev = from, passing = -1, flick = 0;

  const step_ = now => {
    const t = Math.min((now - t0) / SPIN_MS, 1);
    const r = from + (target - from) * easeOut(t);
    const speed = r - prev; prev = r;
    const local = (360 - (r % 360) + 360) % 360;
    const idx = Math.floor(local / step) % N;
    if (idx !== passing) { passing = idx; tickerEl.textContent = dealt[idx].city; flick = Math.min(14, speed * 0.5); }
    else flick *= 0.82;
    rot = r;
    rotor.setAttribute('transform', `rotate(${r} ${CX} ${CY})`);
    needle.setAttribute('transform', `rotate(${flick} ${CX} 18)`);
    if (t < 1) requestAnimationFrame(step_);
    else {
      needle.setAttribute('transform', '');
      tickerEl.innerHTML = '&nbsp;';
      spinning = false;
      land(pick);
    }
  };
  requestAnimationFrame(step_);
}

function land(i) {
  const step = 360 / N;
  kicker.textContent = 'Fate picked';
  document.getElementById('crown').innerHTML = `
    <g transform="rotate(${rot} ${CX} ${CY})" pointer-events="none">
      <path d="${wedgePath(i*step, i*step+step)}" fill="none" stroke="#EFE7D6" stroke-width="6" stroke-linejoin="round"/>
      <path d="${wedgePath(i*step, i*step+step)}" fill="none" stroke="#1C1C1C" stroke-width="1.5" stroke-linejoin="round"/>
    </g>`;
  const t = dealt[i];
  landing.innerHTML = `
    <div class="landing-city">${t.city}</div>
    <div class="lower-third"><span class="l">${t.state}</span><span class="r">Mockup &mdash; no fixture</span></div>
    <button class="btn btn--loud" id="see"><span>See the trip</span></button>
    <button class="btn btn--quiet" id="spinagain"><span>Spin again</span></button>
    <button class="btn btn--quiet" id="again"><span>Deal again</span></button>`;
  document.getElementById('see').onclick = () => alert('The real result screen. Already built (S5/S8).');
  document.getElementById('again').onclick = deal;
  const sa = document.getElementById('spinagain');
  if (sa) sa.onclick = () => { document.getElementById('crown').innerHTML = ''; landing.innerHTML = ''; spin(); };
}

// -------------------------------------------------------------------------
document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    poolKey = c.dataset.pool;
    stripL.textContent = poolKey === 'jax'   ? 'Jacksonville Jaguars'
                       : poolKey === 'tight' ? 'Sat 8 \u2013 Sun 9 Aug'
                       : poolKey === 'wide'  ? 'Sat 5 \u2013 Sun 6 Sept'
                       : 'Sat 18 \u2013 Sun 19 July';
    stripR.textContent = poolKey === 'jax'   ? '10 towns on the slate'
                       : poolKey === 'tight' ? '13 towns in play'
                       : '58 towns in play';
    deal();
  };
});

function updateClock() {
  const pre = 380 + N * 120 + 700 + 700 + 260;      // drop + beat + lift + wheel
  const total = (AUTO ? pre + SPIN_MS : SPIN_MS) / 1000;
  document.getElementById('clock').innerHTML =
    AUTO
      ? `<b>${total.toFixed(1)}s hands-off</b> &mdash; ${(pre/1000).toFixed(1)}s of map, ${(SPIN_MS/1000).toFixed(1)}s of wheel.`
      : `<b>${(pre/1000).toFixed(1)}s of map</b>, then you tap, then ${(SPIN_MS/1000).toFixed(1)}s of wheel.`;
}

document.querySelectorAll('#speeds .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#speeds .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    SPIN_MS = +c.dataset.ms;
    deal();
  };
});

const aOn = document.getElementById('auto-on'), aOff = document.getElementById('auto-off');
aOn.onclick  = () => { AUTO = true;  aOn.classList.add('on');  aOff.classList.remove('on'); deal(); };
aOff.onclick = () => { AUTO = false; aOff.classList.add('on'); aOn.classList.remove('on');  deal(); };

window.addEventListener('load', deal);
</script>
</body>
</html>
